<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎂</text></svg>">
    <title>Birthday Surprise 🎁</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Poppins, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f8f9fb, #e9eef3);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            color: #333;
            padding: 20px;
        }

        /* gift box */

        .gift-container {
            cursor: pointer;
            animation: bounce 2s infinite;
        }

        .gift {
            font-size: 80px;
        }

        .tap-text {
            margin-top: 10px;
            font-size: 14px;
            opacity: .7;
        }

        /* hidden content */

        .content {
            display: none;
            max-width: 500px;
            animation: fadeIn 1s ease;
        }

        .message {
            margin: 20px 0;
            font-size: 15px;
            line-height: 1.6;
        }

        /* gallery */

        .gallery {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .gallery img {
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
            animation: fadeIn 1s ease;
        }

        /* animations */

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0)
            }

            50% {
                transform: translateY(-10px)
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        /* confetti */

        .confetti {
            position: fixed;
            width: 8px;
            height: 8px;
            background: red;
            top: -10px;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to {
                transform: translateY(110vh) rotate(720deg);
            }
        }
    </style>
</head>

<body>

    <div class="gift-container" onclick="openGift()" id="giftBox">
        <div class="gift">🎁</div>
        <div class="tap-text">Tap to open your birthday card</div>
    </div>


    <div class="content" id="content">

        <h2>🎉 Happy Birthday!</h2>

        <div class="message">
            Hope you have a fantastic birthday and an amazing year ahead.
            Stay awesome and keep smiling. Enjoy your day! 🎂
        </div>

        <div class="gallery">
            <img src="image/photo1.jpeg">
            <img src="image/photo2.jpeg">
            <img src="image/photo3.jpeg">
            <img src="image/photo4.jpeg">
        </div>

    </div>


    <script>

        function openGift() {

            document.getElementById("giftBox").style.display = "none";
            document.getElementById("content").style.display = "block";

            createConfetti();

        }

        /* confetti generator */

        function createConfetti() {

            for (let i = 0; i < 80; i++) {

                let conf = document.createElement("div");
                conf.className = "confetti";

                conf.style.left = Math.random() * 100 + "vw";

                conf.style.backgroundColor =
                    ["#ff4d4d", "#ffcc00", "#66ff99", "#66ccff", "#ff99ff"]
                    [Math.floor(Math.random() * 5)];

                conf.style.animationDuration = (2 + Math.random() * 3) + "s";

                document.body.appendChild(conf);

                setTimeout(() => { conf.remove() }, 5000);

            }

        }

    </script>

</body>

</html>
